<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0067c0" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <script src="https://res.cdn.office.net/teams-js/2.53.0/js/MicrosoftTeams.min.js"
          integrity="sha384-UFKwOGC8ix6vOFFC4vH8hSpjwkQXZmSjCx8aaxwhbtm+6joQdNvD7b4pPk82cYAD"
          crossorigin="anonymous"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230067c0'/><circle cx='16' cy='16' r='10' stroke='%23ffffff' stroke-width='2' fill='none'/><polyline points='16,9 16,16 20,19' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 4rem;
      background: #f3f3f3;
      color: #1a1a1a;
    }

    #app { width: 100%; max-width: 640px; }

    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
    .app-icon {
      width: 36px; height: 36px;
      background: #0067c0;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .app-icon svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .brand-text { display: flex; flex-direction: column; gap: 1px; }
    .brand-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    .brand-logo { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; color: #666; text-transform: uppercase; }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.25rem; }
    .stat { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 12px 14px; text-align: center; }
    .stat-val { font-size: 17px; font-weight: 600; color: #1a1a1a; }
    .stat-lbl { font-size: 11px; color: #666; margin-top: 2px; }
    .stat.highlight .stat-val { color: #0067c0; }

    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 1.25rem; margin-bottom: 1.25rem; }

    .timer-display {
      font-size: 44px; font-weight: 300; letter-spacing: 4px; text-align: center;
      padding: 0.5rem 0 1rem; font-variant-numeric: tabular-nums; color: #1a1a1a;
    }

    .row { display: flex; gap: 8px; margin-bottom: 10px; }

    input[type=text], input[type=number], select {
      width: 100%; height: 32px; padding: 0 8px;
      border: 1px solid #adadad; border-radius: 2px;
      background: #fff; color: #1a1a1a; font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.1s;
    }
    input:hover, select:hover { border-color: #666; }
    input:focus, select:focus { border-color: #0067c0; box-shadow: 0 0 0 1px #0067c0; }
    input::placeholder { color: #aaa; }

    .rate-wrap { position: relative; flex: 1; }
    .rate-wrap input { padding-left: 28px; }
    .rate-prefix { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #666; pointer-events: none; font-weight: 500; }

    .divider { height: 1px; background: #e8e8e8; margin: 14px 0; }
    .field-label { font-size: 12px; color: #444; margin-bottom: 6px; }

    .btn-row { display: flex; gap: 8px; }

    button {
      height: 32px; padding: 0 16px;
      border: 1px solid #adadad; border-radius: 2px;
      background: #f9f9f9; color: #1a1a1a; font-size: 13px; font-family: inherit;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.1s; flex: 1;
    }
    button:hover { background: #e9e9e9; border-color: #888; }
    button:active { background: #d9d9d9; transform: none; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.primary { background: #0067c0; border-color: #0067c0; color: #fff; font-weight: 600; }
    button.primary:hover { background: #005ba5; border-color: #005ba5; }
    button.primary:active { background: #004f8f; }

    .entries-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
    .section-label { font-size: 12px; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .filters { display: flex; gap: 4px; flex-wrap: wrap; }
    .f-btn { height: 24px; padding: 0 10px; font-size: 12px; border-radius: 2px; border: 1px solid #adadad; background: #f9f9f9; color: #444; cursor: pointer; flex: none; transition: all 0.1s; }
    .f-btn:hover { background: #e9e9e9; border-color: #888; }
    .f-btn.active { background: #0067c0; color: #fff; border-color: #0067c0; font-weight: 600; }

    .entry {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border: 1px solid #e0e0e0; border-radius: 4px;
      margin-bottom: 6px; background: #fff;
      transition: border-color 0.1s, background 0.1s;
    }
    .entry:hover { border-color: #bbb; background: #fafafa; }
    .entry.running { border-color: #0067c0; background: #f0f6ff; }

    .entry-info { flex: 1; min-width: 0; }
    .entry-name { font-size: 14px; font-weight: 600; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-meta { font-size: 12px; color: #777; margin-top: 1px; }

    .tag { font-size: 11px; padding: 2px 8px; border-radius: 2px; font-weight: 600; flex-shrink: 0; }
    .tag-trabalho { background: #dce9f8; color: #004c8f; }
    .tag-pessoal  { background: #dff2e0; color: #1a6b2a; }
    .tag-reuniao  { background: #fff4cc; color: #7a5800; }
    .tag-outro    { background: #ede8f8; color: #4a2d8f; }

    .proj-pill { font-size: 11px; padding: 2px 8px; border-radius: 2px; background: #f0f0f0; color: #555; border: 1px solid #ddd; flex-shrink: 0; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .entry-right { text-align: right; flex-shrink: 0; }
    .entry-dur { font-size: 14px; font-weight: 600; color: #1a1a1a; }
    .entry-val { font-size: 12px; color: #0067c0; margin-top: 1px; font-weight: 600; }

    .entry-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .icon-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      border-radius: 2px; display: flex; align-items: center; justify-content: center;
      transition: background 0.1s; flex: none; width: auto; height: auto;
    }
    .icon-btn:hover { background: #e9e9e9; }
    .icon-btn svg { width: 16px; height: 16px; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .icon-btn.resume svg { stroke: #0067c0; }
    .icon-btn.edit svg { stroke: #888; }
    .icon-btn.edit:hover svg { stroke: #0067c0; }
    .icon-btn.del svg { stroke: #aaa; }
    .icon-btn.del:hover svg { stroke: #c42b1c; }

    .entry-name { cursor: text; }
    .name-edit-input {
      width: 100%; height: 24px; padding: 0 6px;
      border: 1px solid #0067c0; border-radius: 2px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      color: #1a1a1a; outline: none; box-shadow: 0 0 0 1px #0067c0;
    }

    .running-dot { width: 7px; height: 7px; border-radius: 50%; background: #0067c0; flex-shrink: 0; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.7)} }

    .empty { text-align: center; color: #aaa; font-size: 14px; padding: 3rem 0; }

    .data-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .da-btn {
      height: 30px; padding: 0 12px; flex: 1; min-width: 120px;
      border: 1px solid #adadad; border-radius: 2px; background: #f9f9f9;
      color: #444; font-size: 12px; font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.1s;
    }
    .da-btn:hover { background: #e9e9e9; border-color: #888; }
    .da-btn:active { background: #d9d9d9; }
    .da-btn svg { width: 15px; height: 15px; stroke: #0067c0; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>
<div id="app">

  <div class="brand">
    <div class="app-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/><line x1="12" y1="3" x2="12" y2="1"/><line x1="16.5" y1="4.2" x2="17.8" y2="2.8"/></svg>
    </div>
    <div class="brand-text">
      <div class="brand-title">Time Tracker</div>
      <div class="brand-logo">Brinov</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-today">0h 00m</div><div class="stat-lbl">Hoje</div></div>
    <div class="stat"><div class="stat-val" id="s-total">0h 00m</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-val" id="s-count">0</div><div class="stat-lbl">Entradas</div></div>
    <div class="stat highlight"><div class="stat-val" id="s-earn">R$ —</div><div class="stat-lbl">Valor total</div></div>
  </div>

  <div class="card">
    <div class="timer-display" id="timer-display">00:00:00</div>
    <div class="row">
      <input type="text" id="task-name" placeholder="Nome da tarefa..." style="flex:2;" />
      <select id="task-tag" style="flex:1; min-width:110px;">
        <option value="trabalho">Trabalho</option>
        <option value="pessoal">Pessoal</option>
        <option value="reuniao">Reunião</option>
        <option value="outro">Outro</option>
      </select>
    </div>
    <div class="row">
      <input type="text" id="task-project" placeholder="Projeto (ex: Site novo, App móvel...)" list="projects-dl" />
      <datalist id="projects-dl"></datalist>
    </div>
    <div class="divider"></div>
    <p class="field-label">Valor por hora</p>
    <div class="row" style="margin-bottom:14px;">
      <div class="rate-wrap">
        <span class="rate-prefix">R$</span>
        <input type="number" id="hourly-rate" min="0" step="0.01" placeholder="0,00" oninput="saveRate()" />
      </div>
    </div>
    <div class="btn-row">
      <button class="primary" id="btn-start" onclick="startTimer()">▶ Iniciar</button>
      <button id="btn-stop" onclick="stopTimer()" disabled>⏸ Parar e salvar</button>
    </div>
  </div>

  <div class="entries-header">
    <span class="section-label">Registros</span>
    <div class="filters" id="filters"></div>
  </div>

  <div class="data-actions">
    <button class="da-btn" onclick="exportCSV()" title="Exportar registros para CSV (abre no Excel)">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar CSV
    </button>
    <button class="da-btn" onclick="exportJSON()" title="Salvar backup completo (.json)">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Backup (JSON)
    </button>
    <button class="da-btn" onclick="document.getElementById('import-file').click()" title="Restaurar backup (.json)">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Importar
    </button>
    <input type="file" id="import-file" accept="application/json,.json" style="display:none" onchange="importJSON(event)" />
  </div>

  <div id="entries-list"></div>

</div>

<script>
  let timerInterval = null;
  let startTime = null;
  let activeEntryId = null; // id da entrada sendo cronometrada
  let entries = [];
  let activeFilter = 'todos';

  try { entries = JSON.parse(localStorage.getItem('tt_entries') || '[]'); } catch(e) {}

  // --- Persistência do cronômetro ativo (sobrevive a recarregamento/troca de aba no Teams) ---
  // Guarda { startTime, mode: 'new'|'resume', entryId, name, tag, project }
  function saveActive(state) {
    try {
      if (state) localStorage.setItem('tt_active', JSON.stringify(state));
      else localStorage.removeItem('tt_active');
    } catch(e) {}
  }
  function loadActive() {
    try { return JSON.parse(localStorage.getItem('tt_active') || 'null'); } catch(e) { return null; }
  }

  const rateInput = document.getElementById('hourly-rate');
  rateInput.value = localStorage.getItem('tt_rate') || '';

  function saveRate() { localStorage.setItem('tt_rate', rateInput.value); render(); }
  function getRate() { return parseFloat(rateInput.value) || 0; }

  const tagLabel = { trabalho:'Trabalho', pessoal:'Pessoal', reuniao:'Reunião', outro:'Outro' };

  function pad(n) { return String(n).padStart(2,'0'); }
  function fmtS(s) { return pad(Math.floor(s/3600))+':'+pad(Math.floor((s%3600)/60))+':'+pad(s%60); }
  function fmtHM(s) { return Math.floor(s/3600)+'h '+pad(Math.floor((s%3600)/60))+'m'; }
  function fmtBRL(v) { return v.toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
  function calcVal(secs) { return (secs / 3600) * getRate(); }

  function isToday(ts) {
    const d=new Date(ts), n=new Date();
    return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
  }
  function save() { try { localStorage.setItem('tt_entries', JSON.stringify(entries)); } catch(e){} }
  function projects() { return [...new Set(entries.map(e=>e.project).filter(Boolean))]; }

  function updateDatalist() {
    document.getElementById('projects-dl').innerHTML = projects().map(p=>`<option value="${p}">`).join('');
  }

  function updateFilters() {
    const ps = projects();
    const el = document.getElementById('filters');
    if (!ps.length) { el.innerHTML=''; return; }
    el.innerHTML = ['todos',...ps].map(p=>
      `<button class="f-btn${activeFilter===p?' active':''}" onclick="setFilter('${p}')">${p==='todos'?'Todos':p}</button>`
    ).join('');
  }

  function setFilter(p) { activeFilter=p; render(); }

  function updateStats() {
    const rate = getRate();
    const list = activeFilter==='todos' ? entries : entries.filter(e=>e.project===activeFilter);
    const todaySec = list.filter(e=>isToday(e.ts)).reduce((a,e)=>a+e.secs,0);
    const totalSec = list.reduce((a,e)=>a+e.secs,0);
    const totalEarn = list.reduce((a,e)=>a+calcVal(e.secs),0);
    document.getElementById('s-today').textContent = fmtHM(todaySec);
    document.getElementById('s-total').textContent = fmtHM(totalSec);
    document.getElementById('s-count').textContent = list.length;
    document.getElementById('s-earn').textContent = rate > 0 ? fmtBRL(totalEarn) : 'R$ —';
  }

  function renderEntries() {
    const el = document.getElementById('entries-list');
    const rate = getRate();
    const list = activeFilter==='todos' ? entries : entries.filter(e=>e.project===activeFilter);
    if (!list.length) { el.innerHTML='<div class="empty">Nenhuma entrada. Inicie o cronômetro acima.</div>'; return; }
    el.innerHTML = [...list].reverse().map(e => {
      const d = new Date(e.ts);
      const dt = pad(d.getDate())+'/'+pad(d.getMonth()+1)+' '+pad(d.getHours())+':'+pad(d.getMinutes());
      const proj = e.project ? `<span class="proj-pill" title="${e.project}">${e.project}</span>` : '';
      const val = rate > 0 ? `<div class="entry-val">${fmtBRL(calcVal(e.secs))}</div>` : '';
      const isRunning = activeEntryId === e.id;
      const dot = isRunning ? `<div class="running-dot"></div>` : '';
      const resumeBtn = isRunning
        ? `<button class="icon-btn" title="Pausar esta entrada" onclick="pauseEntry('${e.id}')">
            <svg viewBox="0 0 24 24" style="stroke:#fbbf24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
           </button>`
        : `<button class="icon-btn resume" title="Retomar esta atividade" onclick="resumeEntry('${e.id}')">
            <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
           </button>`;
      return `<div class="entry${isRunning?' running':''}">
        ${dot}
        <div class="entry-info">
          <div class="entry-name" id="name-${e.id}" title="Clique para editar" ondblclick="startEditName('${e.id}')">${e.name||'Sem nome'}</div>
          <div class="entry-meta">${dt}${isRunning ? ' · em andamento' : ''}</div>
        </div>
        ${proj}
        <span class="tag tag-${e.tag||'outro'}">${tagLabel[e.tag]||'Outro'}</span>
        <div class="entry-right">
          <div class="entry-dur" id="dur-${e.id}">${fmtHM(e.secs)}</div>
          ${val ? `<div class="entry-val" id="val-${e.id}">${fmtBRL(calcVal(e.secs))}</div>` : ''}
        </div>
        <div class="entry-actions">
          ${resumeBtn}
          <button class="icon-btn edit" title="Editar nome" onclick="startEditName('${e.id}')">
            <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
          </button>
          <button class="icon-btn del" title="Remover" onclick="del('${e.id}')">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>`;
    }).join('');
  }

  // Edição inline do nome da tarefa (clique no lápis ou duplo clique no nome)
  function startEditName(id) {
    const nameEl = document.getElementById('name-' + id);
    if (!nameEl || nameEl.querySelector('input')) return; // já está editando
    const entry = entries.find(e => e.id === id);
    if (!entry) return;
    const current = entry.name || '';

    const input = document.createElement('input');
    input.type = 'text';
    input.value = current;
    input.className = 'name-edit-input';
    input.maxLength = 120;

    nameEl.innerHTML = '';
    nameEl.appendChild(input);
    input.focus();
    input.select();

    const finish = (commit) => {
      if (commit) {
        const v = input.value.trim();
        entry.name = v || 'Tarefa sem nome';
        save();
      }
      render();
    };
    input.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') { ev.preventDefault(); finish(true); }
      else if (ev.key === 'Escape') { ev.preventDefault(); finish(false); }
    });
    input.addEventListener('blur', () => finish(true));
  }

  function render() { updateDatalist(); updateFilters(); updateStats(); renderEntries(); }
  function del(id) {
    if (activeEntryId === id) stopLive();
    entries = entries.filter(e=>e.id!==id);
    save(); render();
  }

  // Retoma uma entrada existente: carrega os campos e inicia o timer acumulando
  function resumeEntry(id) {
    if (timerInterval) stopLive(); // para qualquer timer ativo primeiro
    const entry = entries.find(e=>e.id===id);
    if (!entry) return;

    activeEntryId = id;
    const alreadySecs = entry.secs;
    startTime = Date.now() - alreadySecs * 1000; // compensar tempo já acumulado

    // Preenche os campos do formulário com os dados da entrada
    document.getElementById('task-name').value = entry.name || '';
    document.getElementById('task-tag').value = entry.tag || 'trabalho';
    document.getElementById('task-project').value = entry.project || '';

    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;

    saveActive({ startTime: startTime, mode: 'resume', entryId: id });

    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('timer-display').textContent = fmtS(elapsed);
      // Atualiza o tempo na linha do registro em tempo real
      const durEl = document.getElementById('dur-' + id);
      if (durEl) durEl.textContent = fmtHM(elapsed);
      const valEl = document.getElementById('val-' + id);
      if (valEl && getRate() > 0) valEl.textContent = fmtBRL(calcVal(elapsed));
    }, 1000);

    render();
  }

  // Pausa uma entrada que está em andamento (sem remover do histórico)
  function pauseEntry(id) {
    if (activeEntryId !== id || !timerInterval) return;
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    clearInterval(timerInterval); timerInterval = null;
    saveActive(null);
    const entry = entries.find(e=>e.id===id);
    if (entry) { entry.secs = elapsed; entry.ts = Date.now(); }
    activeEntryId = null;
    document.getElementById('timer-display').textContent = '00:00:00';
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
    save(); render();
  }

  // Para o timer live sem salvar na entry (usado internamente)
  function stopLive() {
    if (!timerInterval) return;
    clearInterval(timerInterval); timerInterval = null;
    activeEntryId = null;
    document.getElementById('timer-display').textContent = '00:00:00';
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
  }

  function startTimer() {
    if (timerInterval) return;
    activeEntryId = null;
    startTime = Date.now();
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    saveActive({
      startTime: startTime,
      mode: 'new',
      name: document.getElementById('task-name').value.trim(),
      tag: document.getElementById('task-tag').value,
      project: document.getElementById('task-project').value.trim()
    });
    timerInterval = setInterval(() => {
      document.getElementById('timer-display').textContent = fmtS(Math.floor((Date.now()-startTime)/1000));
    }, 1000);
  }

  function stopTimer() {
    if (!timerInterval) return;
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    clearInterval(timerInterval); timerInterval = null;
    saveActive(null);
    document.getElementById('timer-display').textContent = '00:00:00';
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
    if (elapsed < 2) return;

    if (activeEntryId) {
      // Atualiza a entrada existente que foi retomada
      const entry = entries.find(e=>e.id===activeEntryId);
      if (entry) { entry.secs = elapsed; entry.ts = Date.now(); }
      activeEntryId = null;
    } else {
      // Nova entrada
      entries.push({
        id: Date.now().toString(),
        name: document.getElementById('task-name').value.trim() || 'Tarefa sem nome',
        tag: document.getElementById('task-tag').value,
        project: document.getElementById('task-project').value.trim(),
        secs: elapsed, ts: Date.now()
      });
    }
    document.getElementById('task-name').value = '';
    document.getElementById('task-project').value = '';
    save(); render();
  }

  // ---- Exportar / Importar ----
  function downloadFile(content, filename, mime) {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function dateStamp() {
    const d = new Date();
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }

  // CSV — escapa aspas e envolve cada campo; usa ; como separador (padrão BR/Excel)
  function csvCell(v) {
    const s = String(v == null ? '' : v);
    return '"' + s.replace(/"/g, '""') + '"';
  }
  function exportCSV() {
    if (!entries.length) { alert('Nenhum registro para exportar.'); return; }
    const rate = getRate();
    const head = ['Tarefa','Categoria','Projeto','Data/Hora','Duração','Segundos','Valor (R$)'];
    const rows = [...entries].sort((a,b)=>a.ts-b.ts).map(e => {
      const d = new Date(e.ts);
      const dt = pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
      const valor = rate > 0 ? calcVal(e.secs).toFixed(2).replace('.', ',') : '';
      return [ e.name||'Sem nome', tagLabel[e.tag]||'Outro', e.project||'', dt, fmtHM(e.secs), e.secs, valor ];
    });
    // BOM \uFEFF garante acentuação correta ao abrir no Excel
    const csv = '\uFEFF' + [head, ...rows].map(r => r.map(csvCell).join(';')).join('\r\n');
    downloadFile(csv, 'time-tracker_'+dateStamp()+'.csv', 'text/csv;charset=utf-8');
  }

  function exportJSON() {
    const data = { version: 1, exportedAt: new Date().toISOString(), rate: rateInput.value || '', entries };
    downloadFile(JSON.stringify(data, null, 2), 'time-tracker_backup_'+dateStamp()+'.json', 'application/json');
  }

  function importJSON(ev) {
    const file = ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const imported = Array.isArray(data) ? data : data.entries;
        if (!Array.isArray(imported)) throw new Error('formato');
        const ok = confirm('Importar '+imported.length+' registro(s)?\n\nOK = substituir tudo pelo backup.\nCancelar = manter os atuais e adicionar os do backup.');
        if (ok) {
          entries = imported;
        } else {
          const ids = new Set(entries.map(e=>e.id));
          imported.forEach(e => { if (!ids.has(e.id)) entries.push(e); });
        }
        if (!Array.isArray(data) && data.rate != null && data.rate !== '') {
          rateInput.value = data.rate; localStorage.setItem('tt_rate', data.rate);
        }
        save(); render();
        alert('Backup importado com sucesso.');
      } catch (e) {
        alert('Arquivo inválido. Selecione um backup .json gerado por este app.');
      }
      ev.target.value = '';
    };
    reader.readAsText(file);
  }

  // Restaura um cronômetro que estava rodando quando o app foi descarregado
  // (troca de aba no Teams, fechamento, recarregamento). Recalcula pelo timestamp.
  function restoreActive() {
    const st = loadActive();
    if (!st || !st.startTime) return;
    startTime = st.startTime;

    if (st.mode === 'resume') {
      const entry = entries.find(e => e.id === st.entryId);
      if (!entry) { saveActive(null); return; } // entrada removida; descarta estado
      activeEntryId = st.entryId;
      document.getElementById('task-name').value = entry.name || '';
      document.getElementById('task-tag').value = entry.tag || 'trabalho';
      document.getElementById('task-project').value = entry.project || '';
      document.getElementById('btn-start').disabled = true;
      document.getElementById('btn-stop').disabled = false;
      const id = st.entryId;
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('timer-display').textContent = fmtS(elapsed);
        const durEl = document.getElementById('dur-' + id);
        if (durEl) durEl.textContent = fmtHM(elapsed);
        const valEl = document.getElementById('val-' + id);
        if (valEl && getRate() > 0) valEl.textContent = fmtBRL(calcVal(elapsed));
      }, 1000);
    } else {
      activeEntryId = null;
      document.getElementById('task-name').value = st.name || '';
      document.getElementById('task-tag').value = st.tag || 'trabalho';
      document.getElementById('task-project').value = st.project || '';
      document.getElementById('btn-start').disabled = true;
      document.getElementById('btn-stop').disabled = false;
      timerInterval = setInterval(() => {
        document.getElementById('timer-display').textContent = fmtS(Math.floor((Date.now()-startTime)/1000));
      }, 1000);
    }
    // mostra imediatamente, sem esperar 1s
    document.getElementById('timer-display').textContent = fmtS(Math.floor((Date.now()-startTime)/1000));
  }

  render();
  restoreActive();

  // Ao voltar o foco para a aba (ex.: retornar de um chat no Teams), atualiza o display
  // na hora, sem esperar o próximo tick do setInterval.
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && timerInterval && startTime) {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('timer-display').textContent = fmtS(elapsed);
      if (activeEntryId) {
        const durEl = document.getElementById('dur-' + activeEntryId);
        if (durEl) durEl.textContent = fmtHM(elapsed);
        const valEl = document.getElementById('val-' + activeEntryId);
        if (valEl && getRate() > 0) valEl.textContent = fmtBRL(calcVal(elapsed));
      }
    }
  });

  // Registro do service worker (PWA instalável + offline)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }

  // Inicialização do Microsoft Teams (necessária quando rodando como tab no Teams).
  // Se o app não estiver dentro do Teams, falha silenciosamente e segue normal no navegador.
  if (window.microsoftTeams && microsoftTeams.app && typeof microsoftTeams.app.initialize === 'function') {
    microsoftTeams.app.initialize().catch(() => {});
  }

</script>
